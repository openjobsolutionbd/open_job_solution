## type-ভিত্তিক গঠন (সঠিক type চিহ্নিত করা বাধ্যতামূলক, ভুল করে paragraph/short-qa দিয়ে সব ভরবে না):

### "table" — দুই/তিন কলামের ছক

### "math" — ধাপে ধাপে গাণিতিক সমাধান (জ্যামিতির প্রমাণও এই type-এ পড়বে, "বিশেষ নির্বচন"/"অঙ্কন"/"প্রমাণ" সব ধাপ একই steps অ্যারেতে ক্রমিক মিশিয়ে লিখবে)
steps: ["ধাপ ১", "ধাপ ২", ...], answer: "চূড়ান্ত উত্তর"
alternative: { steps, answer } — ঐচ্ছিক

### "translate" — ছোট বিচ্ছিন্ন বাক্য অনুবাদ (বাংলা↔ইংরেজি)
parts: [{ label, source, target }]

### "passage-summary" — একটি সম্পূর্ণ passage/কবিতার সারমর্ম বা বঙ্গানুবাদ (একক বড় passage, ছোট বাক্য নয়)

### "fill-gaps" — শূন্যস্থান পূরণ (preposition/verb/article)
parts: [{ sentence, answer }]

### "sentence-change" — voice/direct-indirect/transform/correct sentence
parts: [{ label, original, changed }]

### "idiom" — বাগধারা/phrase, অর্থ ও উদাহরণ বাক্যসহ
parts: [{ label, phrase, meaning, example }]

### "syn-ant" — Synonym ও Antonym তালিকা
parts: [{ word, synonym, antonym }]

### "gender-change" — Gender পরিবর্তন (Fox→Vixen জাতীয়)
parts: [{ word, changed }]

### "letter" — পত্র/আবেদনপত্র

### "read-fill" — passage পড়ে শূন্যস্থান পূরণ

### "short-qa" — একই বিষয়ের (single subject) ছোট প্রশ্ন-উত্তরের তালিকা
parts: [{ label, q, a }]

### "mixed-qa" — বিভিন্ন বিষয়ের (সাহিত্য/GK/বিজ্ঞান) প্রশ্ন একসাথে মিশ্রিত থাকলে (বাইরের subject ফিল্ড দেবে না, প্রতিটি part-এর নিজস্ব subject থাকবে)
parts: [{ label, subject, q, a }]`;

## যা বের করতে হবে:
1. পরীক্ষার তথ্য: প্রতিষ্ঠান/মন্ত্রণালয়ের পূর্ণ নাম, পদের পূর্ণ নাম, পরীক্ষার সময়কাল (যেমন "৯০ মিনিট"), পরীক্ষার তারিখ, পূর্ণমান

3. যদি প্রশ্নটি একাধিক উপ-প্রশ্নে বিভক্ত (ক/খ/গ/ঘ), প্রতিটি উপ-প্রশ্ন আলাদাভাবে দেখাবে

6. যদি সোর্সে কোনো উত্তর/সমাধান অনুপস্থিত থাকে (যেমন essay টপিক দেওয়া কিন্তু লেখা নেই), তুমি নিজে একটি সংক্ষিপ্ত যুক্তিসঙ্গত মূল উত্তর লিখে দেবে এবং স্পষ্টভাবে উল্লেখ করবে যে এটি AI-রচিত (সোর্সে ছিল না)
7. একাধিক পরীক্ষা একসাথে থাকলে প্রতিটি পরীক্ষাকে স্পষ্ট হেডিং দিয়ে আলাদা করবে

        validate: (code) => {
          const warnings = [];
          if (!code.startsWith("const JOB_SOLUTIONS")) warnings.push("⚠️ আউটপুট const JOB_SOLUTIONS দিয়ে শুরু হয়নি।");
          if (!/qno\s*:\s*"/.test(code)) warnings.push("⚠️ কোনো qno (string ফরম্যাটে) পাওয়া যায়নি।");
          if (!code.trim().endsWith("];")) warnings.push("⚠️ অ্যারে সঠিকভাবে বন্ধ হয়নি — আউটপুট অসম্পূর্ণ হতে পারে।");
          if (code.length < 200) warnings.push("⚠️ আউটপুট খুব ছোট — সম্ভবত প্রশ্নপত্র সম্পূর্ণ পড়া হয়নি।");
          const subjectMatches = code.match(/subject\s*:\s*"([^"]*)"/g) || [];
          const validSubjects = ["bangla", "english", "math", "general-knowledge"];
          subjectMatches.forEach(m => {
            const val = m.match(/"([^"]*)"/)[1];
            if (!validSubjects.includes(val)) warnings.push(`⚠️ অজানা subject পাওয়া গেছে: "${val}"`);
          });
          const typeMatches = code.match(/type\s*:\s*"([^"]*)"/g) || [];
          const validTypes = ["sub-parts", "table", "paragraph", "math", "translate", "passage-summary", "fill-gaps", "sentence-change", "idiom", "syn-ant", "gender-change", "letter", "read-fill", "short-qa", "mixed-qa"];
          typeMatches.forEach(m => {
            const val = m.match(/"([^"]*)"/)[1];
            if (!validTypes.includes(val)) warnings.push(`⚠️ অজানা type পাওয়া গেছে: "${val}"`);
          });
          if (!/id\s*:\s*"job-\d{4}-[a-z0-9-]+-[a-z0-9-]+-q\d+"/.test(code)) {
            warnings.push("⚠️ id ফরম্যাট প্রত্যাশিত প্যাটার্নের (job-YYYY-MINISTRY-POST-qXX) সাথে মিলছে না — ম্যানুয়ালি যাচাই করুন।");
          }
          if (!/ministry\s*:\s*"/.test(code)) warnings.push("⚠️ ministry ফিল্ড পাওয়া যায়নি।");
          if (!/post\s*:\s*"/.test(code)) warnings.push("⚠️ post ফিল্ড পাওয়া যায়নি।");
          return warnings;
        },
        countItems: (code) => (code.match(/qno\s*:\s*"/g) || []).length,
        countLabel: "প্রশ্ন",
      },

      plain_text: {
        id: "plain_text",
        label: "📄 প্লেইন টেক্সট এক্সট্র্যাক্টর",
        description: "ছবি থেকে শুধু টেক্সট বের করে আনে (OCR-এর মতো)। প্রথমে raw এক্সট্র্যাক্ট হবে, আপনি রিভিউ/এডিট করতে পারবেন, তারপর নিশ্চিত করলে ফাইনাল টেক্সট তৈরি হবে।",
        fileExt: "txt",
        mimeForOutput: "text/plain",
        tabOrder: ["camera", "image"],
        twoStep: true,

        extractSystemPrompt: `তুমি একটি OCR বিশেষজ্ঞ। ব্যবহারকারীর দেওয়া ছবি থেকে সব টেক্সট হুবহু বের করে দাও।

## নিয়ম:
- ছবিতে যা লেখা আছে ঠিক তাই লিখবে, কোনো ব্যাখ্যা, সারাংশ বা সংশোধন নয়
- মূল লাইন বিভাজন ও প্যারাগ্রাফ গঠন যতটা সম্ভব বজায় রাখবে
- বাংলা ও ইংরেজি উভয় টেক্সট থাকলে যেমন আছে তেমনই রাখবে, অনুবাদ করবে না
- টেবিল থাকলে সরল টেক্সট আকারে সারি-কলাম বুঝে লিখবে
- কোনো markdown formatting, কোড ব্লক, বা অতিরিক্ত মন্তব্য দেবে না — শুধু খাঁটি টেক্সট`,

        extractUserPrompt: (kind) => "এই ছবি থেকে সব টেক্সট হুবহু বের করে দাও।",

        finalizeSystemPrompt: `তুমি একজন প্রুফরিডার। ব্যবহারকারীর দেওয়া raw OCR টেক্সট (যা সে রিভিউ/এডিট করেছে) তোমাকে দেওয়া হবে। এটি পরিষ্কার করে চূড়ান্ত আকারে দাও।

## নিয়ম:
- বানান/স্পেসিং/লাইন-ব্রেক সমস্যা ঠিক করো, কিন্তু মূল কনটেন্ট পরিবর্তন করবে না
- কোনো markdown formatting বা কোড ব্লক দেবে না — শুধু খাঁটি প্লেইন টেক্সট`,

        finalizeUserPrompt: (rawText) => `নিচের টেক্সট পরিষ্কার করে চূড়ান্ত আকারে দাও:\n\n${rawText}`,

        cleanOutput: (raw) => raw.replace(/^```\s*/i, "").replace(/\s*```$/i, "").trim(),
        validate: (text) => {
          const warnings = [];
          if (text.length < 20) warnings.push("⚠️ আউটপুট খুব ছোট — সম্ভবত ছবিতে টেক্সট স্পষ্ট ছিল না।");
          return warnings;
        },
        countItems: (text) => text.split(/\n+/).filter(l => l.trim()).length,
        countLabel: "লাইন",
      },
    };

    const TASK_LIST = Object.values(TASKS);

    // ===================== HELPERS =====================

    function parseGeminiError(errData, status) {
      const msg = errData?.error?.message || "";
      if (status === 400) return "❌ অনুরোধ ভুল হয়েছে। ফাইলের সাইজ বা ফরম্যাট চেক করুন।";
      if (status === 401 || status === 403) return "🔑 API Key ভুল বা মেয়াদ শেষ। সঠিক Gemini API Key দিন।";
      if (status === 429) return "⏱️ API limit শেষ। কিছুক্ষণ পর আবার চেষ্টা করুন (দৈনিক ১৫০০ রিকোয়েস্ট ফ্রি)।";
      if (status === 500 || status === 503) return "🔧 Gemini সার্ভারে সমস্যা। একটু পর আবার চেষ্টা করুন।";
      if (msg.includes("API_KEY_INVALID")) return "🔑 API Key ভুল। Google AI Studio থেকে নতুন Key নিন।";
      if (msg.includes("QUOTA_EXCEEDED")) return "⏱️ দৈনিক API কোটা শেষ। কাল আবার চেষ্টা করুন।";
      if (msg.includes("TOKEN_LIMIT")) return "📄 ফাইল অনেক বড়। কিছুটা ছোট করে দিন।";
      return `API Error ${status}: ${msg || "অজানা সমস্যা"}`;
    }

    function fileToBase64(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(",")[1]);
        r.onerror = () => rej(new Error("ফাইল পড়া যায়নি"));
        r.readAsDataURL(file);
      });
    }

    const MAX_HISTORY = 2;

    function OpenScanner() {
      const [apiKey, setApiKey] = useState(localStorage.getItem("gemini_api_key") || "");
      const [showKeyInput, setShowKeyInput] = useState(!apiKey);
      const [taskId, setTaskId] = useState(localStorage.getItem("open_scanner_task") || "job_js");
      const [mode, setMode] = useState("image");
      const [textInput, setTextInput] = useState("");
      const [file, setFile] = useState(null);
      const [filePreview, setFilePreview] = useState(null);
      const [loading, setLoading] = useState(false);
      const [step, setStep] = useState("");
      const [flowStep, setFlowStep] = useState(1); // 1 = ইনপুট, 2 = রিভিউ/এডিট, 3 = ফাইনাল
      const [rawText, setRawText] = useState("");
      const [output, setOutput] = useState("");
      const [error, setError] = useState("");
      const [copied, setCopied] = useState(false);
      const [cameraActive, setCameraActive] = useState(false);
      const [cameraErr, setCameraErr] = useState("");
      const [capturedImg, setCapturedImg] = useState(null);
      const [history, setHistory] = useState(() => { try { return JSON.parse(localStorage.getItem("scanner_history") || "[]"); } catch { return []; } });
      const [showHistory, setShowHistory] = useState(false);
      const [warnings, setWarnings] = useState([]);

      const fileRef = useRef();
      const videoRef = useRef();
      const canvasRef = useRef();
      const streamRef = useRef(null);
      const abortRef = useRef(null);
      const previewUrlRef = useRef(null);

      const task = TASKS[taskId];

      useEffect(() => { localStorage.setItem("open_scanner_task", taskId); }, [taskId]);

      const getNextSerial = () => {
        const current = parseInt(localStorage.getItem("download_serial") || "0", 10);
        const next = current + 1;
        localStorage.setItem("download_serial", next.toString());
        return next;
      };

      const saveApiKey = () => { localStorage.setItem("gemini_api_key", apiKey); setShowKeyInput(false); };
      const stopCamera = useCallback(() => {
        if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
        setCameraActive(false);
      }, []);

      const startCamera = useCallback(async () => {
        stopCamera(); setCameraErr(""); setCapturedImg(null);
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 960 } } });
          streamRef.current = stream;
          if (videoRef.current) { videoRef.current.srcObject = stream; videoRef.current.play(); }
          setCameraActive(true);
        } catch (e) {
          if (e.name === "NotAllowedError") setCameraErr("⛔ ক্যামেরা অনুমতি দেওয়া হয়নি। Chrome-এ তালা আইকন থেকে Camera Allow করুন।");
          else if (e.name === "NotFoundError") setCameraErr("📷 কোনো ক্যামেরা পাওয়া যায়নি।");
          else if (e.name === "NotReadableError") setCameraErr("🔒 ক্যামেরা অন্য অ্যাপ ব্যবহার করছে।");
          else setCameraErr("ক্যামেরা চালু করা যায়নি। কারণ: " + e.message);
        }
      }, [stopCamera]);

      const capturePhoto = () => {
        const video = videoRef.current; const canvas = canvasRef.current;
        if (!video || !canvas) return;
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);
        setCapturedImg(canvas.toDataURL("image/jpeg", 0.92).split(",")[1]);
        stopCamera(); resetFlow();
      };

      const retake = () => { setCapturedImg(null); startCamera(); };

      useEffect(() => {
        if (mode === "camera" && !capturedImg) startCamera();
        else if (mode !== "camera") stopCamera();
        return () => stopCamera();
      }, [mode]);

      const handleFile = useCallback((f) => {
        if (!f) return;
        if (!f.type.startsWith("image/")) { setError("শুধু ছবি দেওয়া যাবে।"); return; }
        if (previewUrlRef.current) URL.revokeObjectURL(previewUrlRef.current);
        const url = URL.createObjectURL(f);
        previewUrlRef.current = url;
        setFile(f); setError(""); setFilePreview(url);
        resetFlow();
        setMode("image");
      }, []);

      useEffect(() => { return () => { if (previewUrlRef.current) URL.revokeObjectURL(previewUrlRef.current); }; }, []);

      const resetFlow = () => { setFlowStep(1); setRawText(""); setOutput(""); setError(""); setWarnings([]); };

      const switchMode = (m) => {
        setMode(m); setFile(null);
        if (previewUrlRef.current) { URL.revokeObjectURL(previewUrlRef.current); previewUrlRef.current = null; }
        setFilePreview(null); setCapturedImg(null);
        resetFlow();
        if (m !== "camera") stopCamera();
      };

      const switchTask = (newTaskId) => {
        const newTask = TASKS[newTaskId];
        setTaskId(newTaskId);
        resetFlow();
        if (!newTask.tabOrder.includes(mode)) switchMode(newTask.tabOrder[0]);
      };

      const saveToHistory = (code, sourceMode) => {
        const entry = { time: new Date().toLocaleTimeString("bn-BD"), date: new Date().toLocaleDateString("bn-BD"), taskId, count: task.countItems(code), mode: sourceMode, code };
        const updated = [entry, ...history].slice(0, MAX_HISTORY);
        setHistory(updated); localStorage.setItem("scanner_history", JSON.stringify(updated));
      };

      const cancelRequest = () => { abortRef.current?.abort(); setLoading(false); setStep(""); setError("অনুরোধ বাতিল করা হয়েছে।"); };

      const callGemini = async (systemPrompt, parts, signal) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            systemInstruction: { parts: [{ text: systemPrompt }] },
            contents: [{ parts }],
            generationConfig: { temperature: 0.1, maxOutputTokens: 16384 },
          }),
          signal,
        });
        if (!res.ok) { const errData = await res.json().catch(() => ({})); throw new Error(parseGeminiError(errData, res.status)); }
        const data = await res.json();
        const raw = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!raw) throw new Error("কোনো উত্তর পাওয়া যায়নি।");
        return raw;
      };

      // ধাপ ১: ইনপুট থেকে raw extract
      const runExtract = async () => {
        if (!apiKey) { setError("দয়া করে প্রথমে Gemini API Key দিন।"); return; }
        abortRef.current?.abort(); abortRef.current = new AbortController();
        const signal = abortRef.current.signal;
        setError(""); setLoading(true); setStep("");

        try {
          let parts;
          if (mode === "camera") {
            if (!capturedImg) throw new Error("আগে ছবি তুলুন।");
            setStep("ছবি বিশ্লেষণ করা হচ্ছে...");
            parts = [{ text: task.extractUserPrompt("image") }, { inlineData: { mimeType: "image/jpeg", data: capturedImg } }];
          } else if (mode === "image") {
            if (!file) throw new Error("একটি ছবি আপলোড করুন।");
            setStep("ছবি পড়া হচ্ছে...");
            const b64 = await fileToBase64(file);
            parts = [{ text: task.extractUserPrompt("image") }, { inlineData: { mimeType: file.type, data: b64 } }];
          } else {
            if (!textInput.trim()) throw new Error("টেক্সট লিখুন।");
            setStep("টেক্সট বিশ্লেষণ করা হচ্ছে...");
            parts = [{ text: `${task.extractUserPrompt("text")}\n\n${textInput}` }];
          }
          const raw = await callGemini(task.extractSystemPrompt, parts, signal);
          setRawText(raw.trim());
          setFlowStep(2);
        } catch (e) {
          if (e.name === "AbortError") return;
          setError(e.message || "সমস্যা হয়েছে।");
        } finally { setLoading(false); setStep(""); }
      };

      // ধাপ ২: রিভিউ-করা rawText থেকে ফাইনাল কোড
      const runFinalize = async () => {
        if (!apiKey) { setError("দয়া করে প্রথমে Gemini API Key দিন।"); return; }
        if (!rawText.trim()) { setError("রিভিউ টেক্সট ফাঁকা থাকতে পারবে না।"); return; }
        abortRef.current?.abort(); abortRef.current = new AbortController();
        const signal = abortRef.current.signal;
        setError(""); setLoading(true); setStep("চূড়ান্ত কোড তৈরি করা হচ্ছে...");

        try {
          const parts = [{ text: task.finalizeUserPrompt(rawText) }];
          const raw = await callGemini(task.finalizeSystemPrompt, parts, signal);
          const clean = task.cleanOutput(raw);
          setWarnings(task.validate(clean));
          setOutput(clean);
          saveToHistory(clean, mode);
          setFlowStep(3);
        } catch (e) {
          if (e.name === "AbortError") return;
          setError(e.message || "সমস্যা হয়েছে।");
        } finally { setLoading(false); setStep(""); }
      };

      const backToEdit = () => { setFlowStep(2); setOutput(""); setWarnings([]); setError(""); };
      const startOver = () => { resetFlow(); };

      const copyOutput = (code) => { navigator.clipboard.writeText(code || output).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }); };
      const downloadOutput = (code) => {
        const serial = getNextSerial();
        const blob = new Blob([code || output], { type: task.mimeForOutput });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `${serial}-${task.id}-output.${task.fileExt}`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const itemCount = output ? task.countItems(output) : 0;
      const canExtract = !loading && apiKey && (
        mode === "camera" ? !!capturedImg :
        mode === "text" ? !!textInput.trim() :
        !!file
      );

      return (
        <div className="container">
          <h2 style={{textAlign:"center"}}>🔎 Open Scanner</h2>

          {!apiKey && (
            <div className="key-notice">
              <strong>আপনার Gemini API Key দিন</strong><br />
              <a href="https://aistudio.google.com/apikey" target="_blank">এখানে ক্লিক করে ফ্রি Key নিন</a><br />
              <small>Key আপনার ফোনেই জমা থাকবে, শেয়ার হবে না।</small>
            </div>
          )}

          <div style={{display:"flex", justifyContent:"space-between", marginBottom:8}}>
            <button onClick={() => setShowHistory(!showHistory)}>📜 ইতিহাস {history.length > 0 ? `(${history.length})` : ""}</button>
            <button onClick={() => setShowKeyInput(!showKeyInput)}>⚙️ API Key</button>
          </div>

          {showKeyInput && (
            <div style={{display:"flex", gap:8, marginBottom:8}}>
              <input type="password" placeholder="API Key পেস্ট করুন" value={apiKey} onChange={(e) => setApiKey(e.target.value)} style={{flex:1}} />
              <button onClick={saveApiKey}>Save</button>
            </div>
          )}

          {showHistory && (
            <div style={{marginBottom:14}}>
              <strong>সাম্প্রতিক আউটপুট:</strong>
              {history.length === 0 ? <p>কোনো ইতিহাস নেই।</p> : history.map((h,i) => (
                <div key={i} className="history-item">
                  <span>{h.date} {h.time} · {TASKS[h.taskId]?.label || h.taskId} ({h.mode}) — ✅ {h.count} {TASKS[h.taskId]?.countLabel || ""}</span>
                  <button onClick={() => { setTaskId(h.taskId); copyOutput(h.code); setShowHistory(false); setOutput(h.code); setFlowStep(3); }}>কপি ও ব্যবহার করুন</button>
                </div>
              ))}
              {history.length > 0 && <button onClick={() => { setHistory([]); localStorage.removeItem("scanner_history"); }}>ইতিহাস মুছুন</button>}
            </div>
          )}

          <label style={{fontSize:"0.85rem", fontWeight:600, display:"block", marginBottom:4}}>কাজ বাছাই করুন:</label>
          <select className="task-select" value={taskId} onChange={(e) => switchTask(e.target.value)}>
            {TASK_LIST.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
          </select>
          <div className="info" style={{marginTop:0}}>{task.description}</div>

          <div className="step-indicator">
            <span className={flowStep === 1 ? "active" : "done"}>১. ইনপুট</span>
            <span className={flowStep === 2 ? "active" : flowStep > 2 ? "done" : ""}>২. রিভিউ/এডিট</span>
            <span className={flowStep === 3 ? "active" : ""}>৩. ফাইনাল কোড</span>
          </div>

          {flowStep === 1 && (
            <div>
              <div className="mode-tabs">
                {task.tabOrder.includes("camera") && <button onClick={() => switchMode("camera")} style={{fontWeight: mode==="camera" ? 700 : 400}}>📷 ক্যামেরা</button>}
                {task.tabOrder.includes("image") && <button onClick={() => switchMode("image")} style={{fontWeight: mode==="image" ? 700 : 400}}>🖼️ ছবি</button>}
                {task.tabOrder.includes("text") && <button onClick={() => switchMode("text")} style={{fontWeight: mode==="text" ? 700 : 400}}>✏️ টেক্সট</button>}
              </div>

              {mode === "camera" && (
                <div>
                  {cameraErr && <div className="err">{cameraErr}</div>}
                  {cameraActive && !capturedImg && (
                    <div>
                      <video ref={videoRef} autoPlay playsInline muted />
                      <canvas ref={canvasRef} style={{display:"none"}} />
                      <button onClick={capturePhoto} style={{display:"block", margin:"8px auto", fontSize:"1.5rem"}}>📷 তুলুন</button>
                    </div>
                  )}
                  {!cameraActive && !capturedImg && !cameraErr && (
                    <div style={{textAlign:"center"}}>
                      <button onClick={() => startCamera()}>▶ ক্যামেরা চালু করুন</button>
                    </div>
                  )}
                  {capturedImg && (
                    <div>
                      <img src={`data:image/jpeg;base64,${capturedImg}`} style={{width:"100%", maxHeight:320, objectFit:"cover"}} />
                      <button onClick={retake}>🔄 আবার তুলুন</button>
                    </div>
                  )}
                </div>
              )}

              {mode === "image" && (
                <div>
                  <input type="file" accept="image/*" ref={fileRef} style={{display:"none"}} onChange={(e) => handleFile(e.target.files[0])} />
                  <button onClick={() => fileRef.current?.click()}>📁 ছবি বাছাই করুন</button>
                  {file && (
                    <div style={{marginTop:8, display:"flex", alignItems:"center", gap:8}}>
                      <img src={filePreview} style={{width:52,height:52,objectFit:"cover"}} />
                      <span>{file.name}</span>
                      <button onClick={() => { setFile(null); if(previewUrlRef.current){URL.revokeObjectURL(previewUrlRef.current); previewUrlRef.current=null;} setFilePreview(null); resetFlow(); }}>✕</button>
                    </div>
                  )}
                </div>
              )}

              {mode === "text" && (
                <textarea placeholder={"টেক্সট এখানে পেস্ট করুন..."} value={textInput} onChange={(e) => setTextInput(e.target.value)} />
              )}

              <div style={{display:"flex", gap:8, margin:"12px 0"}}>
                <button disabled={!canExtract} onClick={runExtract} style={{flex:1}}>{loading ? "⏳ প্রক্রিয়া চলছে..." : "⚡ তথ্য বের করো"}</button>
                {loading && <button onClick={cancelRequest}>⛔ বাতিল</button>}
              </div>
            </div>
          )}

          {flowStep === 2 && (
            <div>
              <div className="info">নিচের তথ্য AI প্রশ্নপত্র থেকে বের করেছে। প্রয়োজনে সরাসরি এডিট করুন, তারপর "নিশ্চিত করো" চাপুন।</div>
              <textarea className="raw-edit" value={rawText} onChange={(e) => setRawText(e.target.value)} />
              <div style={{display:"flex", gap:8, margin:"12px 0"}}>
                <button onClick={() => setFlowStep(1)}>◀ পেছনে যান</button>
                <button disabled={loading} onClick={runFinalize} style={{flex:1}}>{loading ? "⏳ প্রক্রিয়া চলছে..." : "✅ নিশ্চিত করো"}</button>
                {loading && <button onClick={cancelRequest}>⛔ বাতিল</button>}
              </div>
            </div>
          )}

          {loading && step && <div className="info"><div style={{width:16,height:16,border:"2px solid #ccc",borderTop:"2px solid #9333ea",borderRadius:"50%",animation:"spin 0.8s linear infinite",display:"inline-block",marginRight:8}} />{step}</div>}
          {error && <div className="err">{error}</div>}
          {warnings.length > 0 && output && <div className="warn"><strong>সতর্কতা:</strong><ul>{warnings.map((w,i) => <li key={i}>{w}</li>)}</ul></div>}

          {flowStep === 3 && output && (
            <div>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                <span>আউটপুট {itemCount > 0 ? `✅ ${itemCount} ${task.countLabel}` : ""}</span>
                <div style={{display:"flex", gap:8}}>
                  <button onClick={() => copyOutput(output)}>{copied ? "✓ কপি হয়েছে" : "📋 কপি"}</button>
                  <button onClick={() => downloadOutput(output)}>📥 ডাউনলোড (.{task.fileExt})</button>
                </div>
              </div>
              <div className="output-box">{output}</div>
              <div style={{display:"flex", gap:8, margin:"12px 0"}}>
                <button onClick={backToEdit}>◀ রিভিউ-তে ফিরে যান</button>
                <button onClick={startOver}>🔄 নতুন শুরু করো</button>
              </div>
              {taskId === "job_js" && (
                <div className="info">
                  <strong>এরপর কী করবেন:</strong><br />
                  ১. কপি বা ডাউনলোড করুন<br />
                  ২. job-solution.js ফাইলে JOB_SOLUTIONS array-তে পেস্ট করুন<br />
                  ৩. update_version.py চালান<br />
                  ৪. Cloudflare-এ আপলোড করুন
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<OpenScanner />);
  </script>
</body>
</html>
